services:
  db:
    image: postgres:15-alpine
    container_name: org_structure_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: org_structure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d org_structure"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: org_structure_api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: secret_password
      DB_NAME: org_structure
      DB_SSLMODE: disable
      APP_PORT: :8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
